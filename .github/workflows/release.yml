name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on v1.0.0, v1.2.3, etc.

permissions:
  contents: write

jobs:
  # ── Windows: NSIS installer + portable .exe ───────────────────────────────
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root deps (sharp for icon generation)
        run: npm install

      - name: Install client deps
        working-directory: client
        run: npm install

      - name: Install server deps
        working-directory: server
        run: npm install

      - name: Generate icons
        run: npm run icons

      - name: Build server
        run: npm run build:server

      - name: Build client
        run: npm run build:client

      - name: Prepare electron bundle
        run: node scripts/prepare-electron.js

      - name: Install electron deps
        working-directory: electron
        run: npm install

      - name: Build Windows installers
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          name: Star Citizen Ledger ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          body: |
            ## Star Citizen Ledger ${{ github.ref_name }}

            ### Downloads
            | File | Platform |
            |---|---|
            | `*-Setup-x64.exe` | Windows 10/11 — installer with Start Menu + Desktop shortcut |
            | `*-Portable-x64.exe` | Windows 10/11 — no install needed |
            | `*-x64.AppImage` | Linux x64 — `chmod +x` then run |
            | `*-x64.deb` | Ubuntu / Debian — `sudo dpkg -i *.deb` |
            | `*-x64.dmg` | macOS Intel |
            | `*-arm64.dmg` | macOS Apple Silicon |

            ### Your data
            Stored locally, never uploaded:
            - **Windows**: `%APPDATA%\star-citizen-ledger\data\`
            - **Linux**: `~/.config/star-citizen-ledger/data/`
            - **macOS**: `~/Library/Application Support/star-citizen-ledger/data/`

            ### Security note
            These builds are not code-signed. Windows SmartScreen will warn on first run — click "More info → Run anyway". See [VirusTotal results](https://github.com/Axiomancer/star-citizen-ledger#virus-scan-results-v100) in the README.
          files: release/**/*.exe

  # ── Linux: AppImage + .deb ────────────────────────────────────────────────
  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system deps for electron-builder
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rpm fakeroot dpkg

      - name: Install root deps
        run: npm install

      - name: Install client deps
        working-directory: client
        run: npm install

      - name: Install server deps
        working-directory: server
        run: npm install

      - name: Generate icons
        run: npm run icons

      - name: Build server
        run: npm run build:server

      - name: Build client
        run: npm run build:client

      - name: Prepare electron bundle
        run: node scripts/prepare-electron.js

      - name: Install electron deps
        working-directory: electron
        run: npm install

      - name: Build Linux packages
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.AppImage
            release/**/*.deb

  # ── macOS: DMG (Intel + Apple Silicon) ───────────────────────────────────
  build-mac:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root deps
        run: npm install

      - name: Install client deps
        working-directory: client
        run: npm install

      - name: Install server deps
        working-directory: server
        run: npm install

      - name: Generate icons
        run: npm run icons

      - name: Build server
        run: npm run build:server

      - name: Build client
        run: npm run build:client

      - name: Prepare electron bundle
        run: node scripts/prepare-electron.js

      - name: Install electron deps
        working-directory: electron
        run: npm install

      - name: Build macOS DMG
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.dmg
            release/**/*.zip
