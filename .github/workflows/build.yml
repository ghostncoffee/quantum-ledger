name: Build

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  # ── Desktop app (Electron, Windows) ────────────────────────────────────────
  build-desktop:
    name: Desktop app (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: quantum-ledger
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root deps
        run: npm install --ignore-scripts

      - name: Install client deps
        working-directory: quantum-ledger/client
        run: npm install --ignore-scripts

      - name: Install server deps
        working-directory: quantum-ledger/server
        run: npm install --ignore-scripts

      - name: Generate icons
        run: npm run icons

      - name: Build server + client
        run: npm run build

      - name: Prepare electron bundle
        run: node scripts/prepare-electron.js

      - name: Install electron deps
        working-directory: quantum-ledger/electron
        run: npm install --ignore-scripts

      - name: Build Windows installers
        working-directory: quantum-ledger/electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: quantum-ledger/release/**/*.exe
          if-no-files-found: error

  # ── Desktop app (Electron, Linux) ─────────────────────────────────────────
  build-desktop-linux:
    name: Desktop app (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quantum-ledger
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system deps for electron-builder
        run: sudo apt-get update -y && sudo apt-get install -y rpm fakeroot dpkg

      - name: Install root deps
        run: npm install --ignore-scripts

      - name: Install client deps
        working-directory: quantum-ledger/client
        run: npm install --ignore-scripts

      - name: Install server deps
        working-directory: quantum-ledger/server
        run: npm install --ignore-scripts

      - name: Generate icons
        run: npm run icons

      - name: Build server + client
        run: npm run build

      - name: Prepare electron bundle
        run: node scripts/prepare-electron.js

      - name: Install electron deps
        working-directory: quantum-ledger/electron
        run: npm install --ignore-scripts

      - name: Build Linux packages
        working-directory: quantum-ledger/electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            quantum-ledger/release/**/*.AppImage
            quantum-ledger/release/**/*.deb
          if-no-files-found: error

  # ── Org server — Windows .exe (pkg) ────────────────────────────────────────
  build-org-server-exe:
    name: Org server (Windows exe)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: quantum-org-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm install

      - name: Build exe
        run: npm run package:exe

      - uses: actions/upload-artifact@v4
        with:
          name: quantum-org-server-exe
          path: quantum-org-server/pkg-dist/quantum-org-server.exe
          if-no-files-found: error

  # ── Org server — Docker image (ghcr.io) ────────────────────────────────────
  build-org-server-docker:
    name: Org server (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: quantum-org-server
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/quantum-org-server:latest

  # ── Publish .exe files to a rolling "latest" pre-release ───────────────────
  publish:
    name: Publish latest release
    needs: [build-desktop, build-desktop-linux, build-org-server-exe]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./quantum-ledger/electron/package.json').version")" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: Update latest pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Quantum Ledger v${{ steps.pkg.outputs.version }}"
          prerelease: true
          make_latest: false
          body: |
            Automated build from the latest commit on `main` — ${{ github.sha }}

            | File | What it is |
            |---|---|
            | `Quantum Ledger-*-Setup-x64.exe` | Desktop app — Windows installer |
            | `Quantum Ledger-*-Portable-x64.exe` | Desktop app — Windows portable, no install needed |
            | `Quantum Ledger-*-x64.AppImage` | Desktop app — Linux, `chmod +x` then run |
            | `Quantum Ledger-*-x64.deb` | Desktop app — Ubuntu / Debian, `sudo dpkg -i *.deb` |
            | `quantum-org-server.exe` | Org server — Windows, self-contained |

            **Org server on Linux / VPS:** use the Docker image — `ghcr.io/ghostncoffee/quantum-org-server:latest`
          files: dist/**/*
